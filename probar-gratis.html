<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Probar gratis | Inputora</title>
  <style>
    :root{
      --bg:#070b14;
      --bg-2:#0d1322;
      --text:#ffffff;
      --muted:#b7bdd3;
      --primary:#6C5CE7;
      --accent:#00D1FF;
      --card:rgba(255,255,255,.06);
      --border:rgba(255,255,255,.12);
      --shadow:0 30px 80px rgba(0,0,0,.45);
      --max:1100px;
    }

    *{box-sizing:border-box}
    html,body{margin:0;padding:0}
    body{
      font-family:Arial,sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at 15% 20%, rgba(108,92,231,.22), transparent 26%),
        radial-gradient(circle at 85% 15%, rgba(0,209,255,.16), transparent 24%),
        linear-gradient(180deg, var(--bg), var(--bg-2));
    }

    .page{
      min-height:100vh;
      position:relative;
      overflow:hidden;
      padding:28px 18px 50px;
    }

    .page::before{
      content:"";
      position:absolute;
      inset:0;
      background-image:
        linear-gradient(rgba(255,255,255,.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.03) 1px, transparent 1px);
      background-size:24px 24px;
      mask-image:linear-gradient(to bottom, rgba(0,0,0,.32), transparent 75%);
      pointer-events:none;
    }

    .inner{
      position:relative;
      z-index:2;
      width:min(var(--max), 100%);
      margin:0 auto;
    }

    .nav{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:14px;
      margin-bottom:34px;
    }

    .logo{
      display:flex;
      align-items:center;
      gap:14px;
      text-decoration:none;
      color:#fff;
      font-weight:800;
      font-size:1.05rem;
    }

    .logo-mark{
      width:56px;
      height:56px;
      object-fit:cover;
      display:block;
      background:#fff;
      border-radius:14px;
      padding:6px;
      box-shadow:
        0 10px 26px rgba(0,0,0,.26),
        inset 0 0 0 1px rgba(255,255,255,.75);
    }

    .nav-link{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:44px;
      padding:0 16px;
      border-radius:999px;
      text-decoration:none;
      color:#fff;
      font-weight:700;
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.14);
    }

    .hero{
      text-align:center;
      margin:0 auto 28px;
      max-width:820px;
    }

    h1{
      margin:0 0 14px;
      font-size:clamp(2.2rem, 5vw, 4.6rem);
      line-height:1.02;
      letter-spacing:-.04em;
      font-weight:900;
    }

    .gradient-text{
      background:linear-gradient(135deg, #b9b2ff 0%, #9de8ff 100%);
      -webkit-background-clip:text;
      background-clip:text;
      color:transparent;
    }

    .subheadline{
      margin:0 auto;
      max-width:760px;
      color:var(--muted);
      font-size:1.1rem;
      line-height:1.7;
    }

    .form-shell{
      margin-top:28px;
      padding:18px;
      border-radius:30px;
      background:linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.05));
      border:1px solid var(--border);
      box-shadow:var(--shadow);
      backdrop-filter:blur(12px);
      -webkit-backdrop-filter:blur(12px);
    }

    .form-frame{
      width:100%;
      min-height:980px;
      border:none;
      border-radius:22px;
      background:#0f1525;
      display:block;
    }

    .helper{
      margin-top:14px;
      text-align:center;
      color:#cdd6ea;
      font-size:.95rem;
    }

    @media (max-width: 640px){
      .page{
        padding:14px 10px 26px;
      }

      .nav{
        margin-bottom:22px;
      }

      .logo{
        gap:10px;
        font-size:1rem;
      }

      .logo-mark{
        width:52px;
        height:52px;
        border-radius:14px;
        padding:5px;
      }

      .nav-link{
        min-height:42px;
        padding:0 14px;
        font-size:.94rem;
      }

      h1{
        font-size:clamp(2rem, 12vw, 3.3rem);
      }

      .subheadline{
        font-size:1rem;
        line-height:1.6;
      }

      .form-shell{
        padding:12px;
        border-radius:22px;
      }

      .form-frame{
        min-height:1080px;
        border-radius:16px;
      }
    }
  </style>
</head>
<body>
  <section class="page">
    <div class="inner">

      <div class="nav">
        <a class="logo" href="index.html">
          <img class="logo-mark" src="https://res.cloudinary.com/dk6lytcvx/image/upload/v1776376365/Icon_arnl49.png" alt="Inputora logo">
          <span>Inputora</span>
        </a>

        <a class="nav-link" href="index.html">Volver</a>
      </div>

      <div class="hero">
        <h1>
          Solicita acceso y empieza a
          <span class="gradient-text">automatizar tus redes</span>
        </h1>

        <p class="subheadline">
          Completa el formulario y te ayudamos a activar tu sistema para crear,
          aprobar y publicar contenido con una experiencia simple, rápida y pensada
          para negocios reales.
        </p>
      </div>

      <div class="form-shell">
        <iframe
          class="form-frame"
          src="YOUR_APPS_SCRIPT_URL_HERE"
          title="Formulario Inputora">
        </iframe>
      </div>

      <p class="helper">
        Te responderemos por email con los siguientes pasos.
      </p>

    </div>
  </section>
</body>
</html>
